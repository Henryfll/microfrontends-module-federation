apiVersion: v1
kind: Service
metadata:
  name: host
  namespace: mf-experiment
  labels:
    app: host
    orchestrator: module-federation
    experiment: microfrontend-study
spec:
  type: NodePort
  selector:
    app: host
    orchestrator: module-federation
    experiment: microfrontend-study
  ports:
    - name: http
      protocol: TCP
      port: 4200
      targetPort: 4200
      nodePort: 30200

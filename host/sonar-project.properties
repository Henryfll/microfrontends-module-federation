# SonarQube - HOST (Module Federation)
# Configuracion homogenea entre microfrontends (host / mf-a / mf-b / mf-c).
# No agregar reglas especificas por framework.

sonar.projectKey=host-module-federation
sonar.projectName=host-module-federation
sonar.projectVersion=1.0.0

# Codigo fuente
sonar.sources=src
sonar.sourceEncoding=UTF-8

# Exclusiones - mantener identicas entre microfrontends
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/*.spec.ts,\
  **/*.test.ts,\
  **/*.spec.js,\
  **/*.test.js,\
  **/environments/**,\
  **/bootstrap.js,\
  **/main.js,\
  webpack.config.js

# Metricas de calidad obligatorias (definidas en el Quality Gate del servidor):
#   - code smells
#   - duplicacion de codigo
#   - complejidad ciclomatica
#   - maintainability rating

###############################################################################
# Pipeline CI/CD - HOST (Module Federation)
# -----------------------------------------------------------------------------
# Unidad experimental independiente. NO ejecuta otros microfrontends.
# Orden fijo: checkout -> node -> npm ci -> sonar -> build -> docker ->
#             kubectl apply -> rollout status -> smoke test.
# Sin cache de dependencias ni de Docker para no afectar las mediciones.
# Estructura identica a los pipelines mf-a / mf-b / mf-c (solo cambian
# identidad y puertos), para garantizar comparabilidad experimental.
###############################################################################

name: host-module-federation

on:
  push:
    branches: [module-federation]
    paths:
      - 'host/**'
      - '.github/workflows/host-pipeline.yml'
  workflow_dispatch:

# Una sola ejecucion concurrente: aisla la medicion de tiempos.
concurrency:
  group: host-module-federation
  cancel-in-progress: false

env:
  # Entorno experimental fijo - NO modificar entre ejecuciones
  NODE_VERSION: '24.13.0'
  NPM_VERSION: '11.6.2'

  # Identidad del microfrontend
  MF_NAME: host
  MF_ROLE: host
  MF_PORT: '4200'
  NODE_PORT: '30200'
  ORCHESTRATOR: module-federation

  # Imagen Docker generada en la fase de contenedorizacion
  IMAGE_NAME: mf-host
  IMAGE_TAG: latest

  # Kubernetes
  K8S_NAMESPACE: mf-experiment
  K8S_DEPLOYMENT: host
  K8S_SERVICE: host

  # SonarQube
  SONAR_PROJECT_KEY: host-module-federation
  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

jobs:
  pipeline:
    name: host CI/CD experimental unit
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: host

    steps:
      # ---------------------------------------------------------------------
      # T0 - Marca de inicio del pipeline (medicion total)
      # ---------------------------------------------------------------------
      - name: Pipeline start timestamp
        id: t_pipeline_start
        working-directory: .
        run: echo "value=$(date +%s%3N)" >> "$GITHUB_OUTPUT"

      # ---------------------------------------------------------------------
      # 1. Checkout del repositorio
      # ---------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: module-federation
          fetch-depth: 0   # historial completo requerido por SonarQube

      # ---------------------------------------------------------------------
      # 2. Configuracion de entorno Node.js (sin cache)
      # ---------------------------------------------------------------------
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # cache deshabilitado intencionalmente: la medicion debe reflejar
          # una instalacion completa cada vez.

      - name: Pin npm ${{ env.NPM_VERSION }}
        run: npm install --global npm@${{ env.NPM_VERSION }}

      - name: Verify toolchain versions
        run: |
          node --version
          npm --version

      # ---------------------------------------------------------------------
      # 3. Instalacion de dependencias (npm ci)
      #    METRICA: tiempo de instalacion
      # ---------------------------------------------------------------------
      - name: npm ci - start
        id: t_install_start
        run: echo "value=$(date +%s%3N)" >> "$GITHUB_OUTPUT"

      - name: Install dependencies (npm ci)
        run: npm ci --no-audit --no-fund

      - name: npm ci - end
        id: t_install_end
        run: |
          END=$(date +%s%3N)
          START=${{ steps.t_install_start.outputs.value }}
          echo "value=$END" >> "$GITHUB_OUTPUT"
          echo "DURATION_INSTALL_MS=$((END - START))" >> "$GITHUB_ENV"

      # ---------------------------------------------------------------------
      # 4. ANALISIS DE CALIDAD - SonarQube (antes del build)
      #    Quality Gate bloqueante: si falla, el pipeline se detiene.
      # ---------------------------------------------------------------------
      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v4
        with:
          projectBaseDir: host
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.projectName=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.sources=src
            -Dsonar.sourceEncoding=UTF-8
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

      - name: SonarQube quality gate (blocking)
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        with:
          scanMetadataReportFile: host/.scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}

      # ---------------------------------------------------------------------
      # 5. Build de la aplicacion
      #    METRICA: tiempo de build
      # ---------------------------------------------------------------------
      - name: build - start
        id: t_build_start
        run: echo "value=$(date +%s%3N)" >> "$GITHUB_OUTPUT"

      - name: Webpack production build (host shell)
        run: npm run build

      - name: build - end
        id: t_build_end
        run: |
          END=$(date +%s%3N)
          START=${{ steps.t_build_start.outputs.value }}
          echo "value=$END" >> "$GITHUB_OUTPUT"
          echo "DURATION_BUILD_MS=$((END - START))" >> "$GITHUB_ENV"

      # ---------------------------------------------------------------------
      # 6. Construccion de imagen Docker
      #    METRICA: tiempo de docker build
      # ---------------------------------------------------------------------
      - name: docker build - start
        id: t_docker_start
        run: echo "value=$(date +%s%3N)" >> "$GITHUB_OUTPUT"

      - name: Build Docker image (no cache, no buildx layer reuse)
        run: |
          docker build \
            --no-cache \
            --pull \
            -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            .

      - name: docker build - end
        id: t_docker_end
        run: |
          END=$(date +%s%3N)
          START=${{ steps.t_docker_start.outputs.value }}
          echo "value=$END" >> "$GITHUB_OUTPUT"
          echo "DURATION_DOCKER_MS=$((END - START))" >> "$GITHUB_ENV"

      # ---------------------------------------------------------------------
      # 7. Despliegue en Kubernetes
      #    METRICA: tiempo de despliegue (apply + rollout status)
      # ---------------------------------------------------------------------
      - name: Setup local Kubernetes (kind)
        uses: helm/kind-action@v1
        with:
          cluster_name: mf-experiment
          wait: 120s

      - name: Load image into kind cluster
        run: |
          kind load docker-image \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            --name mf-experiment

      - name: Create namespace
        working-directory: .
        run: |
          kubectl create namespace ${{ env.K8S_NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: deploy - start
        id: t_deploy_start
        run: echo "value=$(date +%s%3N)" >> "$GITHUB_OUTPUT"

      - name: kubectl apply (deployment + service)
        run: |
          kubectl apply -n ${{ env.K8S_NAMESPACE }} -f k8s/deployment.yaml
          kubectl apply -n ${{ env.K8S_NAMESPACE }} -f k8s/service.yaml

      # ---------------------------------------------------------------------
      # 8. Espera de estado Ready (rollout status)
      # ---------------------------------------------------------------------
      - name: kubectl rollout status (replicas=2 fijas)
        run: |
          kubectl rollout status \
            deployment/${{ env.K8S_DEPLOYMENT }} \
            -n ${{ env.K8S_NAMESPACE }} \
            --timeout=300s

      - name: deploy - end
        id: t_deploy_end
        run: |
          END=$(date +%s%3N)
          START=${{ steps.t_deploy_start.outputs.value }}
          echo "value=$END" >> "$GITHUB_OUTPUT"
          echo "DURATION_DEPLOY_MS=$((END - START))" >> "$GITHUB_ENV"

      - name: Cluster verification (kubectl get)
        run: |
          kubectl get pods    -n ${{ env.K8S_NAMESPACE }} -o wide
          kubectl get svc     -n ${{ env.K8S_NAMESPACE }}
          kubectl get deploy  -n ${{ env.K8S_NAMESPACE }}
          kubectl describe deployment/${{ env.K8S_DEPLOYMENT }} \
            -n ${{ env.K8S_NAMESPACE }}

      # ---------------------------------------------------------------------
      # 9. Smoke test HTTP (http://localhost:<PUERTO>)
      #    Si falla -> pipeline detenido, sin correccion automatica.
      # ---------------------------------------------------------------------
      - name: Port-forward service to localhost:${{ env.MF_PORT }}
        working-directory: .
        run: |
          kubectl port-forward \
            -n ${{ env.K8S_NAMESPACE }} \
            svc/${{ env.K8S_SERVICE }} \
            ${{ env.MF_PORT }}:${{ env.MF_PORT }} &
          echo $! > /tmp/pf.pid
          # espera minima determinista: 5s
          sleep 5

      - name: Smoke test HTTP (blocking)
        id: smoke
        working-directory: .
        run: |
          set -e
          URL="http://localhost:${{ env.MF_PORT }}"
          echo "Smoke test against $URL"
          STATUS=$(curl -s -o /tmp/smoke.body -w "%{http_code}" "$URL")
          echo "HTTP status: $STATUS"
          head -c 400 /tmp/smoke.body || true
          if [ "$STATUS" != "200" ]; then
            echo "SMOKE_RESULT=fail" >> "$GITHUB_ENV"
            echo "Smoke test failed (status=$STATUS). Pipeline detenido."
            exit 1
          fi
          echo "SMOKE_RESULT=success" >> "$GITHUB_ENV"

      - name: Stop port-forward
        if: always()
        working-directory: .
        run: |
          if [ -f /tmp/pf.pid ]; then
            kill "$(cat /tmp/pf.pid)" || true
          fi

      # ---------------------------------------------------------------------
      # Cierre - resumen de metricas
      # ---------------------------------------------------------------------
      - name: Pipeline end timestamp + metrics summary
        if: always()
        working-directory: .
        run: |
          END=$(date +%s%3N)
          START=${{ steps.t_pipeline_start.outputs.value }}
          TOTAL=$((END - START))
          echo "DURATION_PIPELINE_MS=$TOTAL" >> "$GITHUB_ENV"

          {
            echo "## Metricas - host (module-federation)"
            echo ""
            echo "| Metrica                       | Valor (ms) |"
            echo "|------------------------------|------------|"
            echo "| npm ci                       | ${DURATION_INSTALL_MS:-NA} |"
            echo "| build (webpack production)   | ${DURATION_BUILD_MS:-NA} |"
            echo "| docker build                 | ${DURATION_DOCKER_MS:-NA} |"
            echo "| deploy + rollout status      | ${DURATION_DEPLOY_MS:-NA} |"
            echo "| total pipeline               | ${TOTAL} |"
            echo ""
            echo "| Runtime              | Resultado |"
            echo "|----------------------|-----------|"
            echo "| smoke test (HTTP)    | ${SMOKE_RESULT:-NA} |"
            echo ""
            echo "Calidad (SonarQube): ver dashboard del proyecto \`${{ env.SONAR_PROJECT_KEY }}\`"
            echo "Metricas obligatorias: score, code smells, duplicacion, maintainability rating."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Export metrics artifact (JSON)
        if: always()
        working-directory: .
        run: |
          cat > metrics-host.json <<EOF
          {
            "unit": "host",
            "orchestrator": "module-federation",
            "namespace": "${{ env.K8S_NAMESPACE }}",
            "port": ${{ env.MF_PORT }},
            "node_version": "${{ env.NODE_VERSION }}",
            "cicd_ms": {
              "install":  ${DURATION_INSTALL_MS:-null},
              "build":    ${DURATION_BUILD_MS:-null},
              "docker":   ${DURATION_DOCKER_MS:-null},
              "deploy":   ${DURATION_DEPLOY_MS:-null},
              "pipeline": ${DURATION_PIPELINE_MS:-null}
            },
            "runtime": {
              "smoke_test": "${SMOKE_RESULT:-unknown}"
            }
          }
          EOF
          cat metrics-host.json

      - name: Upload metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metrics-host-module-federation
          path: metrics-host.json
          retention-days: 90

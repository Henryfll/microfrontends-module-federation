apiVersion: apps/v1
kind: Deployment
metadata:
  name: mf-b
  namespace: mf-experiment
  labels:
    app: mf-b
    orchestrator: module-federation
    experiment: microfrontend-study
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: mf-b
      orchestrator: module-federation
      experiment: microfrontend-study
  template:
    metadata:
      labels:
        app: mf-b
        orchestrator: module-federation
        experiment: microfrontend-study
    spec:
      restartPolicy: Always
      containers:
        - name: mf-b
          image: mf-b-mf:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4202
              protocol: TCP

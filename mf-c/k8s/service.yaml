apiVersion: v1
kind: Service
metadata:
  name: mf-c
  namespace: mf-experiment
  labels:
    app: mf-c
    orchestrator: module-federation
    experiment: microfrontend-study
spec:
  type: NodePort
  selector:
    app: mf-c
    orchestrator: module-federation
    experiment: microfrontend-study
  ports:
    - name: http
      protocol: TCP
      port: 4203
      targetPort: 4203
      nodePort: 30203

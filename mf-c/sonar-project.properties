# SonarQube - MF-C (Module Federation)
# Configuracion homogenea entre microfrontends (mf-a / mf-b / mf-c / host).
# No agregar reglas especificas por framework.

sonar.projectKey=mf-c-module-federation
sonar.projectName=mf-c-module-federation
sonar.projectVersion=1.0.0

# Codigo fuente
sonar.sources=src
sonar.sourceEncoding=UTF-8

# Exclusiones - mantener identicas entre microfrontends
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/*.spec.ts,\
  **/*.test.ts,\
  **/environments/**,\
  **/main.ts,\
  **/shims-vue.d.ts,\
  webpack.config.js

# Metricas de calidad obligatorias (definidas en el Quality Gate del servidor):
#   - code smells
#   - duplicacion de codigo
#   - complejidad ciclomatica
#   - maintainability rating

apiVersion: v1
kind: Service
metadata:
  name: mf-a
  namespace: mf-experiment
  labels:
    app: mf-a
    orchestrator: module-federation
    experiment: microfrontend-study
spec:
  type: NodePort
  selector:
    app: mf-a
    orchestrator: module-federation
    experiment: microfrontend-study
  ports:
    - name: http
      protocol: TCP
      port: 4201
      targetPort: 4201
      nodePort: 30201
